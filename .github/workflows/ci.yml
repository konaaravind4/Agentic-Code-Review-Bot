name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install google-generativeai fastapi uvicorn pydantic PyGithub requests pytest pytest-asyncio httpx python-dotenv
      - run: python -m pytest tests/ -v --tb=short
